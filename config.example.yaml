# EverySync Configuration Example

server:
  host: "0.0.0.0"
  port: 10086

database:
  path: "~/.every-sync/every-sync.db"

sync:
  max_workers: 0              # 0 = auto (CPU * 2)
  upload_workers: 4
  download_workers: 8
  queue_size: 10000
  retry_max: 3
  retry_delay: 5s
  scan_interval: 5m
  upload_limit: "0"           # 0 = unlimited
  download_limit: "0"         # 0 = unlimited
  chunk_size: "8MB"
  chunk_threshold: "16MB"

log:
  level: "info"               # debug/info/warn/error
  format: "console"           # console/json
  path: "~/.every-sync/logs"

notification:
  webhook_url: ""             # optional: POST important events as JSON
  email:
    smtp_addr: ""             # example: "smtp.example.com:587"
    username: ""
    password: ""
    from: ""
    to: []

# Storage providers
providers:
  - name: "my-webdav"
    type: "webdav"
    params:
      endpoint: "https://dav.example.com"
      username: "user"
      password: "pass"
      timeout: "0"             # optional: 0/empty = no total request timeout; use e.g. "30m" if desired
      auth_mode: "basic"       # optional: basic avoids upload buffering; use "auto" for digest/passport servers

# Sync pairs
pairs:
  - name: "photos"
    local_path: "/home/user/photos"
    remote_path: "/photos"
    provider: "webdav"
    mode: "mirror"             # mirror/selective/virtual
    direction: "both"          # up/down/both
    conflict_strategy: "latest_wins"  # latest_wins/local_wins/remote_wins/manual
    include_patterns: []
    exclude_patterns:
      - "*.tmp"
      - ".cache/**"
    enabled: true
    schedule: ""               # empty = realtime

  - name: "backup"
    local_path: "/home/user/documents"
    remote_path: "/backup/docs"
    provider: "webdav"
    mode: "mirror"
    direction: "up"            # upload only
    conflict_strategy: "latest_wins"
    enabled: true

  - name: "cloud-virtual"
    local_path: "/home/user/cloud"
    remote_path: "/cloud"
    provider: "webdav"
    mode: "virtual"            # index remote files first; materialize on demand
    direction: "down"
    conflict_strategy: "manual"
    enabled: false
